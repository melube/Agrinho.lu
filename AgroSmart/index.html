<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>AgroSmart 2026</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
}

/* TELAS */
.tela{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

/* Tela ativa */
.ativa{
    display:flex;
}

/* 🌱 TELA 1 */
#tela1{
    background-image:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url("29489.jpg"); /* Troque aqui se sua imagem tiver outro nome */

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    color:white;
    text-shadow:2px 2px 6px black;
}

/* 🌿 TELA 2 */
#tela2{
    background-color:#d8f3dc;
    color:#1b4332;
}

/* Botões */
button{
    padding:12px 20px;
    border:none;
    background:#2e7d32;
    color:white;
    font-size:16px;
    margin-top:10px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1b5e20;
}

/* Inputs */
input{
    padding:10px;
    margin:5px;
    width:220px;
    border-radius:6px;
    border:1px solid #999;
    font-size:16px;
}

/* Resultado */
#resultado{
    margin-top:15px;
    font-weight:bold;
    font-size:20px;
}

/* Título */
.titulo-centro{
    font-size:55px;
    font-weight:bold;
    margin:10px 0;
}

h1{
    font-size:48px;
    margin-bottom:10px;
}

p{
    font-size:20px;
}

</style>
</head>

<body>

<!-- 🌱 TELA 1 -->
<div id="tela1" class="tela ativa">

<h1>🌱 Agrinho</h1>

<div class="titulo-centro">2026</div>

<p><b>Luiza Mayer</b></p>

<button onclick="irParaTela2()">
Entrar no Projeto
</button>

</div>

<!-- 🌿 TELA 2 -->
<div id="tela2" class="tela">

<h1>AgroSmart 🌱</h1>

<p>Área da plantação (m²)</p>
<input id="area" type="number">

<p>Litros de água utilizados</p>
<input id="agua" type="number">

<button onclick="calcular()">
Calcular consumo
</button>

<div id="resultado"></div>

<br>

<button onclick="voltar()">
Voltar
</button>

</div>

<script>

function irParaTela2(){
    document.getElementById("tela1").classList.remove("ativa");
    document.getElementById("tela2").classList.add("ativa");
}

function voltar(){
    document.getElementById("tela2").classList.remove("ativa");
    document.getElementById("tela1").classList.add("ativa");
}

function calcular(){

    let area = Number(document.getElementById("area").value);
    let agua = Number(document.getElementById("agua").value);

    let resultado = document.getElementById("resultado");

    if(area <= 0 || agua <= 0){
        resultado.innerHTML = "⚠️ Preencha corretamente.";
        return;
    }

    let consumo = agua / area;

    if(consumo <= 3){
        resultado.innerHTML = "🟢 Uso eficiente de água!";
    }
    else if(consumo <= 7){
        resultado.innerHTML = "🟡 Consumo moderado.";
    }
    else{
        resultado.innerHTML = "🔴 Consumo alto! Economize água.";
    }

}

</script>

</body>
</html>
