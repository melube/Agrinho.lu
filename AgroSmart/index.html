<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Uso Inteligente da Água no Campo</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#e8f5e9}
.tela{display:none;min-height:100vh;background-size:cover;background-position:center;align-items:center;justify-content:center;padding:20px}
#t1{display:flex;background-image:url('inicio.jpg')}
#t2{background-image:url('irrigacao.jpg')}
#t3{background-image:url('resultado.jpg')}
.card{max-width:650px;width:100%;background:rgba(255,255,255,.92);padding:28px;border-radius:16px}
h1,h2{color:#1b5e20}label{display:block;margin-top:12px;font-weight:bold}
input,select,button{width:100%;padding:12px;margin-top:6px;border-radius:8px}
button{background:#2e7d32;color:#fff;border:none;cursor:pointer;margin-top:18px}
#res{padding:12px;border-radius:10px;margin:10px 0}
</style>
</head>
<body>
<div id="t1" class="tela">
<div class="card">
<h1>Uso Inteligente da Água no Campo</h1>
<p>Este projeto conscientiza sobre o uso sustentável da água na agricultura.</p>
<button onclick="mostrar('t2')">Começar</button>
</div></div>

<div id="t2" class="tela">
<div class="card">
<h2>Informe os dados</h2>
<label>Área do terreno (m²)</label><input id="area" type="number">
<label>Tipo de cultivo</label>
<select id="cult">
<option>Milho</option><option>Soja</option><option>Tomate</option><option>Alface</option><option>Trigo</option><option>Batata</option>
</select>
<label>Quantidade de água (litros)</label><input id="agua" type="number">
<button onclick="calc()">Calcular</button>
<button onclick="mostrar('t1')">Voltar</button>
</div></div>

<div id="t3" class="tela">
<div class="card">
<h2>Resultado</h2>
<div id="res"></div>
<div id="dicas"></div>
<button onclick="mostrar('t2')">Calcular novamente</button>
<button onclick="mostrar('t1')">Início</button>
</div></div>

<script>
function mostrar(id){
document.querySelectorAll('.tela').forEach(t=>t.style.display='none');
document.getElementById(id).style.display='flex';
}
const lim={Milho:.60,Soja:.55,Tomate:.75,Alface:.45,Trigo:.50,Batata:.65};
function calc(){
let a=+area.value,g=+agua.value,c=cult.value;
if(!a||!g){alert("Preencha todos os campos.");return;}
let uso=g/a,l=lim[c],r=document.getElementById('res'),d=document.getElementById('dicas');
let msg,cor;
if(uso<=l){msg="✅ Consumo Ideal";cor="#c8e6c9";}
else if(uso<=l*1.5){msg="⚠ Consumo Moderado";cor="#fff9c4";}
else{msg="❌ Consumo Excessivo";cor="#ffcdd2";}
r.style.background=cor;
r.innerHTML="<b>"+msg+"</b><br>Consumo: "+uso.toFixed(2)+" L/m²";
d.innerHTML="<h3>Dicas sustentáveis</h3><ul><li>Use irrigação por gotejamento.</li><li>Aproveite água da chuva.</li><li>Regue em horários mais frescos.</li><li>Faça manutenção do sistema de irrigação.</li></ul>";
mostrar('t3');
}
</script>
</body></html>
